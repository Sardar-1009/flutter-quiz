name: flutter_quiz_app
description: Flutter Quiz App - Тест по Dart/Flutter (MVVM)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.5
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  firebase_analytics: ^12.4.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/questions.json
    - assets/images/icon.png
